<!DOCTYPE html>
<html>
<head>
  <title>Smart Library Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; text-align: center; }

    #seats {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 10px;
      justify-content: center;
      margin: 20px;
    }

    .seat {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .free { background: green; }
    .occupied { background: red; }

    #noiseBox {
      width: 150px;
      margin: auto;
      padding: 10px;
      color: white;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>📚 Smart Library Dashboard</h1>

<h3 id="stats">Loading...</h3>
<h3 id="prediction"></h3>

<div id="noiseBox">Noise</div>

<h3>🪑 Digital Twin (Seats)</h3>
<div id="seats"></div>

<h3>📊 Occupancy Trend</h3>
<canvas id="chart" width="600" height="300"></canvas>

<script src="script.js"></script>
</body>
</html>
